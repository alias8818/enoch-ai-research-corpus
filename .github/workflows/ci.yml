name: Corpus CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Rebuild index
        run: python3 scripts/build_index.py
      - name: Run quality scan
        run: python3 scripts/quality_scan.py
      - name: Validate public trust surfaces
        run: python3 scripts/validate_public_trust_surfaces.py
      - name: Run import script tests
        run: python3 -m unittest discover -s tests -v
      - name: Verify generated indexes and reports are current
        run: git diff --exit-code -- papers/index.json papers/index.md quality/quality_report.json quality/quality_report.md quality/packaging_provenance_report.json quality/packaging_provenance_report.md quality/claim_evidence_audit.json quality/claim_evidence_audit.md
  secret-scan:
    name: secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
