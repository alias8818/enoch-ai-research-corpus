name: Public release integrity

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  public-release-integrity:
    name: public-release-integrity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout corpus repo
        uses: actions/checkout@v7
        with:
          path: enoch-ai-research-corpus
      - name: Checkout system repo
        uses: actions/checkout@v7
        with:
          repository: alias8818/enoch-agentic-research-system
          path: enoch-agentic-research-system
      - name: Checkout promising signals repo
        uses: actions/checkout@v7
        with:
          repository: alias8818/enoch-promising-signals
          path: enoch-promising-signals
      - name: Checkout docs repo
        uses: actions/checkout@v7
        with:
          repository: alias8818/enoch-docs
          path: enoch-docs
      - name: Checkout profile site repo
        uses: actions/checkout@v7
        with:
          repository: alias8818/alias8818.github.io
          path: alias8818.github.io
      - name: Checkout owner profile repo
        uses: actions/checkout@v7
        with:
          repository: alias8818/alias8818
          path: alias8818
      - name: Validate committed public release accounting and wording
        working-directory: enoch-agentic-research-system
        run: |
          python3 scripts/generate_ecosystem_manifest.py --corpus ../enoch-ai-research-corpus --docs ../enoch-docs --promising ../enoch-promising-signals --output /tmp/enoch-ecosystem.generated.json
          python3 scripts/validate_public_release.py --system . --corpus ../enoch-ai-research-corpus --docs ../enoch-docs --promising ../enoch-promising-signals --profile ../alias8818.github.io --owner-profile ../alias8818 --generated-manifest /tmp/enoch-ecosystem.generated.json
