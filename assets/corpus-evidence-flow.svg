<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="360" viewBox="0 0 1100 360" role="img" aria-labelledby="title desc"><title id="title">Corpus evidence flow</title><desc id="desc">Public-safe diagram of generated artifacts, evidence bundles, claim ledgers, and strict audit.</desc><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#07101f"/><stop offset="1" stop-color="#111827"/></linearGradient><linearGradient id="a" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#7dd3fc"/><stop offset="1" stop-color="#c084fc"/></linearGradient><filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><style>.title{font:800 34px ui-sans-serif,system-ui,Segoe UI,sans-serif;fill:#edf3ff}.small{font:600 17px ui-sans-serif,system-ui,Segoe UI,sans-serif;fill:#b8c3d9}.tiny{font:600 13px ui-sans-serif,system-ui,Segoe UI,sans-serif;fill:#93a4c2}.box{fill:rgba(15,23,42,.82);stroke:#334155;stroke-width:1.5}.accent{stroke:url(#a);stroke-width:4;fill:none;marker-end:url(#arrow)}.pill{fill:#0f172a;stroke:#475569}.num{font:900 28px ui-sans-serif,system-ui,Segoe UI,sans-serif;fill:#7dd3fc}.muted{fill:#93a4c2;font:500 14px ui-sans-serif,system-ui,Segoe UI,sans-serif}</style><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#8b5cf6"/></marker></defs><rect width="1100" height="360" rx="26" fill="url(#bg)"/><text x="52" y="62" class="title">A corpus with the audit trail attached</text><g transform="translate(55 130)"><rect class="box" width="190" height="110" rx="18"/><text class="small" x="20" y="42">AI artifact</text><text class="tiny" x="20" y="74">generated report</text></g><path class="accent" d="M258 185 H335"/><g transform="translate(345 105)"><rect class="box" width="220" height="160" rx="18"/><text class="small" x="20" y="42">Evidence bundle</text><text class="tiny" x="20" y="74">run notes</text><text class="tiny" x="20" y="96">metrics + result files</text><text class="tiny" x="20" y="118">public availability</text></g><path class="accent" d="M578 185 H655"/><g transform="translate(665 105)"><rect class="box" width="180" height="160" rx="18"/><text class="small" x="20" y="42">Claim ledger</text><text class="tiny" x="20" y="74">quoted support</text><text class="tiny" x="20" y="96">limitations</text><text class="tiny" x="20" y="118">review state</text></g><path class="accent" d="M858 185 H930"/><g transform="translate(940 130)"><rect class="box" width="115" height="110" rx="18"/><text class="small" x="19" y="42">Audit</text><text class="tiny" x="19" y="74">393/393</text></g></svg>
